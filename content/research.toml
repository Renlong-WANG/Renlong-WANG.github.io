type = "research"
title = "Research"
description = "My research connects infrastructure resilience, multi-attribute decision analysis, and complex system modeling to study how interdependent socio-technical systems can be understood, compared, and improved under uncertainty. Across these directions, I develop modeling, predictive, and prescriptive methods for disruptions, recovery processes, resource allocation, and robust decisions involving heterogeneous stakeholder preferences."
publications = "publications.bib"
drafts = "drafts"

[[areas]]
id = "infrastructure-resilience"
title = "Infrastructure Resilience"
keywords = ["Infrastructure Resilience"]
description = "This area studies how interdependent infrastructure systems can be measured, predicted, compared, and restored in ways that are technically reliable and equity-aware. Building on smart and equitable resilience modeling perspectives, I focus on resilience metrics, simulation-based surrogate models, recovery planning, benchmarking, and resource-allocation methods that can adapt to uncertain hazards, cascading dependencies, evolving system conditions, and uneven community needs."

[[areas]]
id = "multi-attribute-decision-analysis"
title = "Multi-Attribute Decision Analysis"
keywords = ["Multi-Attribute Decision Analysis"]
description = "This area develops preference learning and robust weighting methods for decision problems with incomplete information, uncertain judgments, and multiple stakeholders. The goal is to turn sparse or ambiguous preference evidence into transparent rankings, allocations, and policy choices that remain reliable under uncertainty."

[[areas]]
id = "complex-system-modeling-analysis"
title = "Complex System Modeling & Analysis"
keywords = ["Complex System Modeling & Analysis"]
description = "This area models complex socio-technical systems through network-based, scenario-based, and simulation-based approaches. The focus is on revealing dependencies, feedback, and dynamic mechanisms in emergency response, energy systems, public-health interventions, and other coupled systems."
